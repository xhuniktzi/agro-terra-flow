version: "3.9"

services:

  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "1883:1883"
      - "8222:8222"
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    command: "-c /etc/nats/nats.conf"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agriculture}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-agriculture}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  processor:
    build:
      context: ./src/processor
      dockerfile: Dockerfile
    image: agricultura/processor:latest
    container_name: processor
    restart: on-failure
    environment:
      NATS_URL: nats://nats:4222
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-agriculture}
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      nats:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    image: agricultura/api:latest
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-agriculture}
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      timescaledb:
        condition: service_healthy

  simulator:
    build:
      context: ./src/simulator
      dockerfile: Dockerfile
    image: agricultura/simulator:latest
    container_name: simulator
    restart: on-failure
    environment:
      MQTT_HOST: nats
      MQTT_PORT: "1883"
      PUBLISH_INTERVAL_SECONDS: "5"
      STARTUP_DELAY_SECONDS: "20"
    depends_on:
      nats:
        condition: service_healthy
      processor:
        condition: service_started

volumes:
  nats_data:
  timescaledb_data:
  grafana_data:
