apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: agricultura
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
    - name: nats
      port: 4222
      targetPort: 4222
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: monitor
      port: 8222
      targetPort: 8222
  type: ClusterIP
